<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Base B20 operations console preview</title>
  <desc id="desc">A preview of the Base B20 web app with workflow steps, operation tabs, an Asset launch form, token workspace, web app test flow, and activity log.</desc>
  <defs>
    <style>
      .bg { fill: #f3f5f2; }
      .panel { fill: #ffffff; stroke: #d2dcd6; stroke-width: 1.2; }
      .soft { fill: #f7fbf8; stroke: #c3cec7; stroke-width: 1.2; }
      .field { fill: #ffffff; stroke: #b8c5be; stroke-width: 1.1; }
      .button { fill: #15201d; }
      .outline { fill: #ffffff; stroke: #c5d0ca; stroke-width: 1.2; }
      .accent { fill: #2c7566; }
      .done { fill: #1f8b61; }
      .warn { fill: #d19b2d; }
      .log { fill: #0f1715; }
      .line { stroke: #edf1ee; stroke-width: 1; }
      .ink { fill: #16201d; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #65766f; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #263631; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .white { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-weight: 800; }
      .logtext { fill: #e9fff8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900"/>

  <text x="48" y="56" class="muted" font-size="14" font-weight="800">BASE SEPOLIA TESTNET</text>
  <text x="48" y="104" class="ink" font-size="42" font-weight="800">B20 operations console</text>
  <rect x="1026" y="48" width="232" height="44" rx="6" class="panel"/>
  <text x="1046" y="75" class="muted" font-size="15">Connected to Base Sepolia</text>
  <rect x="1276" y="48" width="116" height="44" rx="6" class="button"/>
  <text x="1300" y="75" class="white" font-size="14">MetaMask</text>

  <g transform="translate(48 132)">
    <rect x="0" y="0" width="321" height="62" rx="8" class="soft"/>
    <circle cx="34" cy="31" r="16" class="done"/>
    <text x="30" y="36" class="white" font-size="14">1</text>
    <text x="62" y="37" class="ink" font-size="17" font-weight="800">Wallet</text>

    <rect x="337" y="0" width="321" height="62" rx="8" class="soft"/>
    <circle cx="371" cy="31" r="16" class="done"/>
    <text x="367" y="36" class="white" font-size="14">2</text>
    <text x="399" y="37" class="ink" font-size="17" font-weight="800">Token</text>

    <rect x="674" y="0" width="321" height="62" rx="8" class="panel"/>
    <circle cx="708" cy="31" r="16" class="accent"/>
    <text x="704" y="36" class="white" font-size="14">3</text>
    <text x="736" y="37" class="ink" font-size="17" font-weight="800">Memo transfer</text>

    <rect x="1011" y="0" width="321" height="62" rx="8" class="panel"/>
    <circle cx="1045" cy="31" r="16" fill="#e7ece8"/>
    <text x="1041" y="36" class="muted" font-size="14" font-weight="800">4</text>
    <text x="1073" y="37" class="muted" font-size="17" font-weight="800">Reconcile</text>
  </g>

  <g transform="translate(48 214)">
    <rect x="0" y="0" width="150" height="42" rx="6" class="button"/>
    <text x="50" y="27" class="white" font-size="14">Deploy</text>
    <rect x="160" y="0" width="128" height="42" rx="6" class="outline"/>
    <text x="207" y="27" class="muted" font-size="14" font-weight="800">Mint</text>
    <rect x="298" y="0" width="184" height="42" rx="6" class="outline"/>
    <text x="332" y="27" class="muted" font-size="14" font-weight="800">Transfer/Redeem</text>
    <rect x="492" y="0" width="146" height="42" rx="6" class="outline"/>
    <text x="528" y="27" class="muted" font-size="14" font-weight="800">Reconcile</text>
    <rect x="648" y="0" width="128" height="42" rx="6" class="outline"/>
    <text x="690" y="27" class="muted" font-size="14" font-weight="800">Status</text>
  </g>

  <g transform="translate(48 270)">
    <rect x="0" y="0" width="832" height="86" rx="8" class="panel"/>
    <text x="20" y="30" class="muted" font-size="13" font-weight="800">CURRENT OPERATION</text>
    <text x="20" y="62" class="ink" font-size="22" font-weight="800">Deploy</text>
    <text x="118" y="62" class="muted" font-size="15">Create a new Asset B20 or load an existing Base Sepolia token.</text>
    <rect x="678" y="23" width="130" height="40" rx="6" class="button"/>
    <text x="704" y="49" class="white" font-size="14">Base Sepolia</text>
  </g>

  <g transform="translate(48 374)">
    <rect x="0" y="0" width="832" height="430" rx="8" class="panel"/>
    <text x="22" y="36" class="ink" font-size="20" font-weight="800">Asset launch</text>
    <text x="22" y="62" class="muted" font-size="14">Start with Base Sepolia. Mainnet deploys stay outside this browser UI.</text>

    <rect x="22" y="88" width="788" height="44" rx="8" fill="#f7f9f7" stroke="#d2dcd6"/>
    <rect x="28" y="94" width="386" height="32" rx="6" class="button"/>
    <text x="199" y="116" class="white" font-size="13">Asset</text>
    <text x="562" y="116" class="muted" font-size="13" font-weight="800">Stablecoin</text>

    <text x="22" y="164" class="muted" font-size="12" font-weight="800">WALLET PROVIDER</text>
    <rect x="22" y="174" width="376" height="42" rx="6" class="field"/>
    <text x="40" y="200" class="mono" font-size="14">MetaMask (io.metamask)</text>

    <text x="420" y="164" class="muted" font-size="12" font-weight="800">BASE SEPOLIA RPC URL</text>
    <rect x="420" y="174" width="390" height="42" rx="6" class="field"/>
    <text x="438" y="200" class="mono" font-size="14">https://sepolia.base.org</text>

    <text x="22" y="248" class="muted" font-size="12" font-weight="800">NAME</text>
    <rect x="22" y="258" width="376" height="42" rx="6" class="field"/>
    <text x="40" y="284" class="mono" font-size="14">DieuTX B20</text>

    <text x="420" y="248" class="muted" font-size="12" font-weight="800">SYMBOL</text>
    <rect x="420" y="258" width="390" height="42" rx="6" class="field"/>
    <text x="438" y="284" class="mono" font-size="14">DIEUTX</text>

    <text x="22" y="332" class="muted" font-size="12" font-weight="800">DECIMALS</text>
    <rect x="22" y="342" width="246" height="42" rx="6" class="field"/>
    <text x="40" y="368" class="mono" font-size="14">18</text>
    <text x="293" y="332" class="muted" font-size="12" font-weight="800">SUPPLY CAP</text>
    <rect x="293" y="342" width="246" height="42" rx="6" class="field"/>
    <text x="311" y="368" class="mono" font-size="14">1000000</text>
    <text x="564" y="332" class="muted" font-size="12" font-weight="800">SALT</text>
    <rect x="564" y="342" width="246" height="42" rx="6" class="field"/>
    <text x="582" y="368" class="mono" font-size="14">dieutx-b20-v1</text>

    <rect x="22" y="402" width="386" height="46" rx="6" class="outline"/>
    <text x="164" y="431" class="ink" font-size="15" font-weight="800">Preview address</text>
    <rect x="424" y="402" width="386" height="46" rx="6" class="button"/>
    <text x="574" y="431" class="white" font-size="15">Deploy B20</text>
  </g>

  <g transform="translate(906 374)">
    <rect x="0" y="0" width="486" height="236" rx="8" class="panel"/>
    <text x="18" y="34" class="ink" font-size="19" font-weight="800">Token workspace</text>
    <rect x="370" y="14" width="96" height="36" rx="6" class="button"/>
    <text x="392" y="37" class="white" font-size="13">Load</text>
    <rect x="18" y="60" width="448" height="40" rx="6" class="field"/>
    <text x="34" y="85" class="mono" font-size="13">0xb2000000000000000000000Ac7b3A3E8930eAfE3</text>

    <text x="18" y="132" class="muted" font-size="12" font-weight="800">ACCOUNT</text>
    <text x="184" y="132" class="mono" font-size="13">0x0cd269...3e4b8</text>
    <line x1="18" y1="150" x2="466" y2="150" class="line"/>
    <text x="18" y="180" class="muted" font-size="12" font-weight="800">VARIANT</text>
    <text x="184" y="180" class="mono" font-size="13">Asset (18 decimals)</text>
    <line x1="18" y1="198" x2="466" y2="198" class="line"/>
    <text x="18" y="228" class="muted" font-size="12" font-weight="800">SUPPLY CAP</text>
    <text x="184" y="228" class="mono" font-size="13">1,000,000 DIEUTX</text>
  </g>

  <g transform="translate(906 626)">
    <rect x="0" y="0" width="486" height="178" rx="8" class="panel"/>
    <text x="18" y="34" class="ink" font-size="19" font-weight="800">Web app test flow</text>
    <text x="18" y="60" class="muted" font-size="14">A short Sepolia path for another developer to repeat.</text>
    <g transform="translate(18 78)">
      <circle cx="14" cy="16" r="13" fill="#e7ece8"/>
      <text x="10" y="21" class="muted" font-size="12" font-weight="800">1</text>
      <text x="38" y="20" class="ink" font-size="14" font-weight="800">Connect</text>
      <text x="38" y="40" class="muted" font-size="12">Connect MetaMask, then switch to Base Sepolia.</text>
      <circle cx="14" cy="72" r="13" fill="#e7ece8"/>
      <text x="10" y="77" class="muted" font-size="12" font-weight="800">2</text>
      <text x="38" y="76" class="ink" font-size="14" font-weight="800">Deploy or load</text>
      <text x="38" y="96" class="muted" font-size="12">Preview, deploy, or load an existing token.</text>
    </g>
  </g>

  <g transform="translate(48 824)">
    <rect x="0" y="0" width="832" height="52" rx="8" class="panel"/>
    <rect x="18" y="17" width="6" height="18" class="warn"/>
    <text x="36" y="33" class="muted" font-size="14" font-weight="800">Guarded actions stay out of the public UI:</text>
    <text x="290" y="33" class="mono" font-size="14">policy mutation, pause/unpause, burnBlocked, admin renounce</text>
  </g>

  <g transform="translate(906 824)">
    <rect x="0" y="0" width="486" height="52" rx="8" class="log"/>
    <text x="18" y="22" class="logtext" font-size="12">[4:52:46 PM] B20 token deployed at 0xb200...AfE3</text>
    <text x="18" y="40" class="logtext" font-size="12">[4:53:42 PM] Receipt check found 1 Transfer/Memo pair</text>
  </g>
</svg>
